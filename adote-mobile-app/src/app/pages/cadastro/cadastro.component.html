    <ion-list>

          <div slot="label">Nome Completo</div>

      </ion-item>
    </ion-list>
  
    <ion-list>
      <ion-item lines="none">
        <ion-input labelPlacement="floating">

      <ion-item lines="none">

      <ion-item lines="none">

      <ion-list>
